name: Commit

# Runs heavier security checks on every non-main branch push so problems are
# caught before a PR is opened against main. ci.yaml already covers fmt /
# clippy / test on the same triggers; this workflow is the deeper sweep.

on:
  push:
    branches-ignore:
      - main

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  actions: read

jobs:
  # ── 1. Security audit ─────────────────────────────────────────────────────
  # Checks direct and transitive dependencies against the RustSec advisory
  # database. Fails on any known vulnerability without an explicit ignore.
  # Ignores are intentionally empty here — add them with a comment citing the
  # advisory and the reason the warning is acceptable if one comes up.
  security-audit:
    name: Security Audit
    runs-on: arc-runner-dm-mcp

    steps:
      - name: Install required packages
        run: |
          for i in 1 2 3; do
            sudo apt-get update -qq && sudo apt-get install -y build-essential pkg-config && break
            echo "apt-get attempt $i failed; retrying in 10 s..."
            sleep 10
          done

      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      # Cache the registry AND ~/.cargo/bin so cargo-audit doesn't recompile every run.
      # On self-hosted runners a cold cargo-audit build is ~30 minutes; this cuts that to
      # a restore + lockfile diff on warm cache hits.
      - name: Cache cargo registry + installed binaries
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/bin
          key: ${{ runner.os }}-cargo-audit-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-audit-

      - name: Install cargo-audit
        # Skip the compile if the cached binary is already present on PATH.
        run: command -v cargo-audit >/dev/null || cargo install cargo-audit --locked

      - name: Run cargo audit
        run: cargo audit
